        <section>
            <h2>Formulários</h2>
            <form method="post" action="">
                <fieldset>
                    <legend> Dados Pessoais</legend>
                    <label for="nome">Nome:</label>
                    <input required placeholder="Digite seu nome..." nome="nome-completo" id="nome" type="text">

                <fieldset>

                </fieldset>

                <fieldset>
                    <legend>Qual o melhor período para estudo?</legend>

                    <input type="radio" id="manha" nome="periodo-estudo">
                    <label for="manha">Manhã</label>

                    <label for="tarde">Tarde</label>

                </fieldset>

                    <br>

                    <label for="leite">Leite</label>
                    <br>

                </fieldset>
